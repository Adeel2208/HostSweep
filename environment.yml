name: hostsweep
channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  # Python
  - python>=3.9
  - pip
  - setuptools

  # Bioinformatics tools
  - fastp>=0.23.0
  - minimap2>=2.24
  - bowtie2>=2.5.0
  - samtools>=1.17
  - bbmap>=39.01
  - multiqc>=1.14

  # Python packages
  - numpy
  - pandas
  - scipy
  - urllib3
